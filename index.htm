/* =========================
   🌑 FONDO GLOBAL LUJO + LLUVIA NEON DIAMANTES 
========================= */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  background: linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
}

#glow {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(circle at 50% 20%, rgba(255,215,0,0.10), transparent 55%),
              radial-gradient(circle at 20% 80%, rgba(0,255,255,0.05), transparent 60%);
  animation: ambientMove 12s ease-in-out infinite;
}

@keyframes ambientMove {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

#rain {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.diamond {
  position: absolute;
  width: 5px;
  height: 5px;
  background: radial-gradient(circle, #fff 0%, #bffcff 30%, #ffd700 55%, transparent 75%);
  transform: rotate(45deg);
  opacity: 0.9;
  box-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 14px rgba(0,255,255,0.7),
    0 0 22px rgba(255,215,0,0.5);
  animation: fall linear forwards, glow 1.5s ease-in-out infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(260deg); opacity: 0; }
}

@keyframes glow {
  0% { filter: brightness(1); }
  50% { filter: brightness(2); }
  100% { filter: brightness(1); }
}

header, section, footer {
  position: relative;
  z-index: 2;
}

header {
  text-align: center;
  padding: 70px 20px 35px;
}

.title-gold {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 800;
  letter-spacing: 6px;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(90deg,#7a5c12,#ffd700,#fff8dc,#d4af37,#8c6a12);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 6s ease-in-out infinite;
}

@keyframes shine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.productos {
  padding: 60px 15px;
  background: rgba(0,0,0,0.35);
  border-top: 1px solid rgba(212,175,55,0.15);
  border-bottom: 1px solid rgba(212,175,55,0.15);
}

.productos h2 {
  text-align: center;
  margin-bottom: 35px;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(90deg,#b8860b,#fff,#d4af37,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.grid {
  max-width: 1100px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 25px;
}

footer {
  text-align: center;
  padding: 25px;
  font-size: 0.8rem;
  color: #888;
}

</style>
