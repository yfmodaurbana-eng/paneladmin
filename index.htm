<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 50px 20px;
  border-bottom: 1px solid rgba(212,175,55,0.2);
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;

  background: linear-gradient(90deg,#fff,#d4af37,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 5px;
}

/* CONTENEDOR CATÁLOGO (como antes) */
.productos {
  padding: 60px 20px;
  background: #111;
}

/* TITULO */
.productos h2 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 2rem;

  background: linear-gradient(90deg,#d4af37,#fff,#d4af37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* GRID MODERNO */
.grid {
  max-width: 1100px;
  margin: auto;

  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 30px;
}

.card {
  cursor: pointer;
  padding: 0;
}

.card img {
  width: 100%;
  height: 190px;
  object-fit: cover;
  border-radius: 8px;
}

.info h3 {
  font-size: 0.85rem;
  margin: 6px 0 4px;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.precio {
  font-size: 0.85rem;
  color: #d4af37;
}

/* BOTÓN */
.btn {
  margin-top: 5px;
  font-size: 0.7rem;
  padding: 5px;
  width: 100%;

  background: transparent;
  border: 1px solid #d4af37;
  color: #d4af37;
  border-radius: 4px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 0.8rem;
  color: #666;
  border-top: 1px solid rgba(212,175,55,0.2);
}

</style>

<script>

var imagenes = [
  "https://i.imgur.com/Kb6WlCs.jpeg",
  "https://i.imgur.com/1GStM7t.jpeg"
];

var colores = ["Blanco","Negro"];
var referencia = "";
var producto = "Camiseta Diamon (Cachaba)";
var i = 0;

function cambiarColor(){

  var colorSeleccionado =
  document.getElementById("color").value;

  if(colorSeleccionado == "Blanco"){
    document.getElementById("img").src =
    "https://i.imgur.com/Kb6WlCs.jpeg";
    i = 0;
  }

  if(colorSeleccionado == "Negro"){
    document.getElementById("img").src =
    "https://i.imgur.com/I1dAXjw.jpeg";
    i = 1;
  }
}

function next(){
  i++;
  if(i >= imagenes.length){ i = 0; }

  document.getElementById("img").src = imagenes[i];
  document.getElementById("color").value = colores[i];
}

function prev(){
  i--;
  if(i < 0){ i = imagenes.length - 1; }

  document.getElementById("img").src = imagenes[i];
  document.getElementById("color").value = colores[i];
}

function enviar(){

  var color = document.getElementById("color").value;
  var talla = document.getElementById("talla").value;
  var nombre = document.getElementById("nombre").value;
  var telefono = document.getElementById("telefono").value;
  var direccion = document.getElementById("direccion").value;
  var ciudad = document.getElementById("ciudad").value;
  var cp = document.getElementById("cp").value;

  var msg =
  "🛍️ PEDIDO%0A%0A" +
  "Producto: " + producto + "%0A" +
  "Referencia: " + referencia + "%0A%0A" +
  "Color: " + color + "%0A" +
  "Talla: " + talla + "%0A%0A" +
  "--- ENVÍO ---%0A" +
  "Nombre: " + nombre + "%0A" +
  "Teléfono: " + telefono + "%0A" +
  "Dirección: " + direccion + "%0A" +
  "Ciudad: " + ciudad + "%0A" +
  "CP: " + cp;

  window.open("https://wa.me/34607877328?text=" + msg);
}

</script>
