<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Black Diamond</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #1a1a1a, #000);
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/8QfQ7vF.png");
  opacity: 0.05;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 15px;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.6rem;

  background: linear-gradient(90deg, #fff, #d4af37, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 4px;
}

header p {
  color: #888;
  font-size: 0.75rem;
}

/* SECCIÓN */
.productos {
  padding: 30px 10px;
}

.productos h2 {
  text-align: center;
  font-size: 1.5rem;

  background: linear-gradient(90deg, #d4af37, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  margin-bottom: 20px;
}

/* GRID MÁS DENSO */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

/* CARD MÁS COMPACTA */
.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 10px rgba(212,175,55,0.2);
}

/* IMG MÁS PEQUEÑA (CLAVE) */
.card img {
  width: 100%;
  height: 140px; /* 👈 aquí está el cambio importante */
  object-fit: cover;
  border-radius: 6px;
}

/* TEXTO MÁS FINO */
.card h3 {
  font-size: 0.85rem;
  margin: 6px 0 3px;
}

.precio {
  font-size: 0.85rem;
  color: #d4af37;
}

/* FORM */
select {
  width: 100%;
  margin-top: 4px;
  padding: 5px;
  font-size: 0.75rem;
  background: black;
  color: white;
  border: 1px solid #333;
  border-radius: 4px;
}

/* BOTÓN */
.btn {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  font-size: 0.75rem;

  background: linear-gradient(45deg, #d4af37, #f5d76e);
  border: none;
  color: black;
  border-radius: 5px;
  cursor: pointer;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 12px;
  font-size: 0.75rem;
  color: #666;
}

</style>
</head>

<body>

<header>
  <h1>Black Diamond</h1>
  <p>Luxury Streetwear</p>
</header>

<section class="productos">
  <h2>Catálogo</h2>

  <div class="grid">

    <!-- PRODUCTO -->
    <div class="card">
      <img src="https://i.imgur.com/Kb6WlCs.jpeg">
      <h3>Camiseta Diamond</h3>
      <p class="precio">35€</p>

      <select>
        <option>Color</option>
        <option>Blanco</option>
        <option>Negro</option>
      </select>

      <select>
        <option>Talla</option>
        <option>S</option>
        <option>M</option>
        <option>L</option>
      </select>

      <button class="btn">Comprar</button>
    </div>

  </div>
</section>

<footer>
  © 2026 Black Diamond
</footer>

</body>
</html>
