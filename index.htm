<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   🌑 FONDO PREMIUM LUJO
========================= */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;

  background:
    radial-gradient(circle at 20% 10%, rgba(212,175,55,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.06), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(212,175,55,0.08), transparent 55%),
    linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
}

/* =========================
   💎 HEADER
========================= */
header {
  text-align: center;
  padding: 70px 20px 35px;
}

/* TITULO PRINCIPAL */
.title-gold {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 800;
  letter-spacing: 6px;
  font-family: 'Playfair Display', serif;

  background: linear-gradient(90deg,#7a5c12,#ffd700,#fff8dc,#d4af37,#8c6a12);
  background-size: 300% 300%;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 6s ease-in-out infinite;

  text-shadow:
    0 0 20px rgba(212,175,55,0.15),
    0 0 40px rgba(255,215,0,0.05);
}

/* ANIMACIÓN ORO */
@keyframes shine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* =========================
   💎 CATÁLOGO
========================= */
.productos {
  padding: 60px 15px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(212,175,55,0.15);
  border-bottom: 1px solid rgba(212,175,55,0.15);
}

/* TITULO CATÁLOGO (MISMO EFECTO QUE HEADER) */
.productos h2 {
  text-align: center;
  margin-bottom: 35px;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-family: 'Playfair Display', serif;

  background: linear-gradient(90deg,#b8860b,#fff,#d4af37,#fff);
  background-size: 300% 300%;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 5s ease-in-out infinite;

  letter-spacing: 4px;
}

/* =========================
   📦 GRID RESPONSIVE
========================= */
.grid {
  max-width: 1100px;
  margin: auto;

  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 25px;
}

/* =========================
   📱 AJUSTE MÓVIL
========================= */
@media (max-width: 600px) {

  header {
    padding: 50px 15px 20px;
  }

  .productos {
    padding: 40px 10px;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 25px;
  font-size: 0.8rem;
  color: #888;
  border-top: 1px solid rgba(212,175,55,0.15);
}

</style>
</head>

<body>

<header>
  <h1 class="title-gold">Black Diamond</h1>
</header>

<section class="productos">

  <div class="grid">

</section>

</html>
