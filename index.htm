<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Black Diamond</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 50px 20px;
  border-bottom: 1px solid rgba(212,175,55,0.2);
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;

  background: linear-gradient(90deg,#fff,#d4af37,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 5px;
}

/* CONTENEDOR CATÁLOGO (como antes) */
.productos {
  padding: 60px 20px;
  background: #111;
}

/* TITULO */
.productos h2 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 2rem;

  background: linear-gradient(90deg,#d4af37,#fff,#d4af37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* GRID MODERNO */
.grid {
  max-width: 1100px;
  margin: auto;

  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 20px;
}

/* CARD SIMPLE */
.card {
  cursor: pointer;
}

/* IMG */
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 6px;
  transition: 0.2s;
}

.card:hover img {
  opacity: 0.85;
}

/* INFO */
.info {
  padding: 6px 2px;
}

.info h3 {
  font-size: 0.8rem;
  margin: 4px 0;
  font-weight: 400;
}

.precio {
  font-size: 0.85rem;
  color: #d4af37;
}

/* BOTÓN */
.btn {
  margin-top: 5px;
  font-size: 0.7rem;
  padding: 5px;
  width: 100%;

  background: transparent;
  border: 1px solid #d4af37;
  color: #d4af37;
  border-radius: 4px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 0.8rem;
  color: #666;
  border-top: 1px solid rgba(212,175,55,0.2);
}

</style>
</head>

<body>

<header>
  <h1>Black Diamond</h1>
</header>

<section class="productos">
  <h2>Catálogo</h2>

  <div class="grid">

    <!-- PRODUCTO 1 -->
    <div class="card">
      <img src="https://i.imgur.com/Kb6WlCs.jpeg">

      <div class="info">
        <h3>Camiseta Diamond Blanca</h3>
        <div class="precio">35€</div>
        <button class="btn">Comprar</button>
      </div>
    </div>

    <!-- PRODUCTO 2 -->
    <div class="card">
      <img src="https://i.imgur.com/1GStM7t.jpeg">

      <div class="info">
        <h3>Camiseta Diamond Negra</h3>
        <div class="precio">35€</div>
        <button class="btn">Comprar</button>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Black Diamond
</footer>

</body>
</html>
