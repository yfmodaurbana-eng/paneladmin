<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Black Diamond</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 10px;
  border-bottom: 1px solid #222;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;

  background: linear-gradient(90deg,#fff,#d4af37,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* TITULO */
h2 {
  text-align: center;
  margin: 25px 0;
  font-size: 1.3rem;
  color: #d4af37;
}

/* GRID MÁS TIPO TIENDA */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  padding: 10px;
}

/* CARD NUEVA (MUCHO MÁS SIMPLE) */
.card {
  cursor: pointer;
}

/* SOLO IMAGEN PRINCIPAL */
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 6px;
}

/* INFO DEBAJO (tipo Zara) */
.info {
  padding: 6px 2px;
  text-align: left;
}

.info h3 {
  font-size: 0.75rem;
  margin: 3px 0;
  font-weight: 400;
}

.precio {
  font-size: 0.8rem;
  color: #d4af37;
}

/* BOTÓN MINI */
.btn {
  margin-top: 5px;
  font-size: 0.7rem;
  padding: 5px;
  width: 100%;
  background: #111;
  border: 1px solid #d4af37;
  color: #d4af37;
  border-radius: 4px;
}

/* HOVER SUTIL */
.card:hover img {
  opacity: 0.85;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 0.7rem;
  padding: 15px;
  color: #555;
}

</style>
</head>

<body>

<header>
  <h1>Black Diamond</h1>
</header>

<h2>Catálogo</h2>

<div class="grid">

  <!-- PRODUCTO -->
  <div class="card">
    <img src="https://i.imgur.com/Kb6WlCs.jpeg">

    <div class="info">
      <h3>Camiseta Diamond</h3>
      <div class="precio">35€</div>

      <button class="btn">Comprar</button>
    </div>
  </div>

  <!-- DUPLICA PARA MÁS -->

</div>

<footer>
  © 2026 Black Diamond
</footer>

</body>
</html>
