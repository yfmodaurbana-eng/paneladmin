<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Camisetas</title>

<style>
body{font-family:Arial;display:flex;justify-content:center;background:#f4f4f4;}
.card{width:300px;background:white;padding:15px;border-radius:12px;position:relative;}
img{width:100%;height:180px;object-fit:cover;border-radius:10px;}
button{cursor:pointer;}
.arrow{position:absolute;top:90px;background:black;color:white;border:none;border-radius:50%;width:30px;height:30px;}
.left{left:10px;}
.right{right:10px;}
select,input{width:100%;margin-top:5px;padding:6px;}
</style>

</head>

<body>

<div class="card">

<!-- 📸 IMAGEN -->
<img id="img" src="https://i.imgur.com/Kb6WlCs.jpeg">

<button class="arrow left" onclick="prev()">‹</button>
<button class="arrow right" onclick="next()">›</button>

<h3>💎 Camiseta Diamond</h3>
<p>💸 35€</p>
<p>Ref: CD001</p>

<!-- 🎨 COLOR -->
<select id="color" onchange="syncColor()">
  <option value="">🎨 Color</option>
  <option value="Blanco">Blanco</option>
  <option value="Negro">Negro</option>
</select>

<!-- 🏷️ TALLA -->
<select id="talla">
  <option value="">🏷️ Talla</option>
  <option>S</option>
  <option>M</option>
  <option>L</option>
</select>

<!-- 📦 ENVÍO -->
<details>
<summary>📦 Dirección de envío</summary>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="calle" placeholder="Calle">
<input id="ciudad" placeholder="Ciudad">
<input id="cp" placeholder="C.P">

</details>

<!-- 🟢 BOTÓN -->
<button onclick="sendWhatsApp()" style="width:100%;margin-top:10px;background:#25D366;border:none;padding:10px;border-radius:10px;font-weight:bold;">
💳 Pago Bizum / WhatsApp
</button>

</div>

<script>

let images = [
 "https://i.imgur.com/Kb6WlCs.jpeg", // blanco
 "https://i.imgur.com/I1dAXjw.jpeg"  // negro
];

let colors = ["Blanco","Negro"];
let i = 0;

function next(){
 i++;
 if(i>=images.length) i=0;
 update();
}

function prev(){
 i--;
 if(i<0) i=images.length-1;
 update();
}

function syncColor(){
 let c = document.getElementById("color").value;
 if(c=="Blanco") i=0;
 if(c=="Negro") i=1;
 update();
}

function update(){
 document.getElementById("img").src = images[i];
 document.getElementById("color").value = colors[i];
}

function sendWhatsApp(){

 let msg =
 "🛍️ PEDIDO%0A%0A"+
 "Producto: Camiseta Diamond%0A"+
 "Color: "+document.getElementById("color").value+"%0A"+
 "Talla: "+document.getElementById("talla").value+"%0A%0A"+
 "📦 ENVÍO%0A"+
 "Nombre: "+document.getElementById("nombre").value+"%0A"+
 "Teléfono: "+document.getElementById("telefono").value+"%0A"+
 "Calle: "+document.getElementById("calle").value+"%0A"+
 "Ciudad: "+document.getElementById("ciudad").value+"%0A"+
 "CP: "+document.getElementById("cp").value;

 window.open("https://wa.me/34607877328?text="+msg);

}

</script>

</body>
</html>
