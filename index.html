<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🧭 TITULO SEO (cambia aquí si quieres posicionar mejor en Google) -->
<title>Black Diamond | Moda Streetwear Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =======================
   EFECTOS DE FONDO
======================= */

#rain, #stars {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

/* 💎 DIAMANTES (LLUVIA) */
.diamond {
  position: absolute;
  width: 18px;
  height: auto;
  opacity: 0.9;
  pointer-events: none;
  animation: fall linear forwards, glow 2.2s ease-in-out infinite;
  transform-origin: center;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.8));
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

@keyframes glow {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

/* ✨ ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 2.5s infinite ease-in-out;
  box-shadow: 0 0 6px white;
}

@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
  100% { opacity: 0; transform: scale(0.8); }
}

/* =======================
   ESTILO GENERAL
======================= */

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  background: linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
  overflow-x: hidden;
}

/* 🧠 todo el contenido por encima del fondo */
header, section, footer, nav {
  position: relative;
  z-index: 2;
}

/* =======================
   MENU (URLS IMPORTANTES)
======================= */

nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  padding: 20px;
  border-bottom: 1px solid rgba(212,175,55,0.15);
}

nav a {
  text-decoration: none;
  color: #fff;
  border: 1px solid rgba(212,175,55,0.25);
  padding: 10px 18px;
  border-radius: 12px;
  transition: 0.3s;
  font-size: 14px;
}

nav a:hover {
  background: #ABAA57;
  color: #000;
}

/* =======================
   HEADER (TITULO + TEXTO)
======================= */

header {
  text-align: center;
  padding: 50px 20px 20px;
}

.title-gold {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;
  background: linear-gradient(90deg,#7a5c12,#ffd700,#fff8dc,#d4af37,#8c6a12);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 🧾 TEXTO DE MARCA (puedes cambiar marketing aquí) */
.subtitle {
  max-width: 700px;
  margin: 10px auto 0;
  color: #d6d6d6;
  line-height: 1.6;
}

/* =======================
   HERO (IMAGEN PRINCIPAL)
======================= */

.hero {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

.hero img {
  width: 100%;
  border-radius: 18px;
  display: block;
}

/* =======================
   CATALOGO (AQUI VAN PRODUCTOS)
======================= */

.productos {
  padding: 60px 20px;
}

.productos h2 {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin-bottom: 35px;
  background: linear-gradient(90deg,#b8860b,#fff,#d4af37,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 📦 AQUÍ VAN LOS IFRAMES DE PRODUCTOS */
.grid {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 28px;
  justify-items: center;
}

.grid iframe {
  width: 100%;
  max-width: 260px;
  min-height: 620px;
  border: none;
}

/* =======================
   FOOTER
======================= */

footer {
  text-align: center;
  padding: 30px;
  color: #888;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}

/* =======================
   FONDO EFECTOS CAPAS
======================= */

</style>
</head>

<body>

<!-- 💎 EFECTOS -->
<div id="rain"></div>
<div id="stars"></div>

<!-- 🧭 MENU (URLs de páginas) -->
<nav>
  <a href="index.html">Inicio</a>
  <a href="camisetas.html">Camisetas</a>
  <a href="conjuntos.html">Conjuntos</a>
  <a href="gorras.html">Gorras</a>
</nav>

<!-- 🏷️ HEADER -->
<header>
  <h1 class="title-gold">Black Diamond</h1>

  <!-- ✏️ TEXTO DE MARKETING -->
  <p class="subtitle">
    Streetwear premium · ediciones limitadas · estilo exclusivo · envíos rápidos
  </p>
</header>

<!-- 🖼️ IMAGEN PRINCIPAL -->
<section class="hero">
  <img src="https://i.imgur.com/PFgZjzN.png" alt="Portada Black Diamond">
</section>

<!-- 📦 CATÁLOGO (AQUÍ VAN PRODUCTOS) -->
<section class="productos">
  <h2>Catálogo Destacado</h2>

  <div class="grid">
    <!-- 🔴 PEGAR PRODUCTOS AQUÍ (IFRAMES) -->
  </div>
</section>

<footer>
  © 2026 Black Diamond
</footer>

<script>

/* 💎 DIAMANTES */
function createDiamond(){
  const d = document.createElement("img");
  d.src = "https://i.imgur.com/5HS1lGY.png";
  d.className = "diamond";

  d.style.left = Math.random() * 100 + "vw";
  d.style.top = "-10vh";

  const size = 10 + Math.random() * 20;
  d.style.width = size + "px";

  d.style.opacity = 0.5 + Math.random() * 0.5;

  d.style.transform = `rotate(${Math.random() * 360}deg)`;

  d.style.animationDuration = (8 + Math.random() * 6) + "s";

  document.getElementById("rain").appendChild(d);

  setTimeout(() => d.remove(), 12000);
}

/* ✨ ESTRELLAS */
function createStar(){
  const s = document.createElement("div");
  s.className = "star";

  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";

  const size = Math.random() * 2.5;
  s.style.width = size + "px";
  s.style.height = size + "px";

  s.style.animationDuration = (1.5 + Math.random() * 3) + "s";

  document.getElementById("stars").appendChild(s);

  setTimeout(() => s.remove(), 6000);
}

/* 💎 DENSIDAD DE EFECTOS */
setInterval(createDiamond, 350);
setInterval(createStar, 40);

</script>

</body>
</html>
