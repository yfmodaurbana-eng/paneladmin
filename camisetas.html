<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Diamond | Moda Streetwear Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =======================
   FONDO EFECTOS
======================= */

#rain, #stars {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

/* 💎 DIAMANTES */
.diamond {
  position: absolute;
  width: 18px;
  height: auto;
  opacity: 0.9;
  pointer-events: none;
  animation: fall linear forwards, glow 2.2s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.8));
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

@keyframes glow {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

/* ✨ ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 2.5s infinite ease-in-out;
  box-shadow: 0 0 6px white;
}

@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
  100% { opacity: 0; transform: scale(0.8); }
}

/* =======================
   BASE
======================= */

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  background: linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
  overflow-x: hidden;
  text-align: center;
}

header, section, footer {
  position: relative;
  z-index: 2;
  text-align: center;
}

/* =======================
   TITULO
======================= */

h1 {
  font-size: clamp(3.5rem, 8vw, 6.5rem);
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;

  background: linear-gradient(
    90deg,
    #7a5c12,
    #ffd700,
    #fff8dc,
    #d4af37,
    #7a5c12
  );

  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shimmer 4s linear infinite;

  text-shadow: 0 0 18px rgba(255,215,0,0.25);
}

/* =======================
   BADGE LINGOTE (AJUSTADO AL TEXTO)
======================= */

.gold-badge {
  display: inline-block;          /* 🔥 CLAVE: NO ocupa ancho completo */
  margin: 30px auto 10px;
  padding: 10px 22px;

  border-radius: 18px;

  background: linear-gradient(
    145deg,
    #3a2a00,
    #b8860b,
    #ffd700,
    #b8860b,
    #3a2a00
  );

  background-size: 300% 300%;
  animation: shimmer 6s linear infinite;

  box-shadow:
    0 0 18px rgba(255,215,0,0.25),
    inset 0 0 14px rgba(0,0,0,0.6);

  border: 1px solid rgba(255,215,0,0.35);

  position: relative;
}

/* brillo interno */
.gold-badge::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(
    120deg,
    transparent 25%,
    rgba(255,255,255,0.12) 45%,
    transparent 65%
  );
  animation: shineMove 5s infinite linear;
}

@keyframes shineMove {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* texto dentro del badge */
.gold-title {
  font-size: clamp(1.3rem, 2vw, 1.8rem);
  font-family: 'Playfair Display', serif;

  background: linear-gradient(
    90deg,
    #7a5c12,
    #ffd700,
    #fff8dc,
    #d4af37,
    #7a5c12
  );

  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shimmer 4s linear infinite;

  margin: 0;
  white-space: nowrap;
}

/* =======================
   GRID
======================= */

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 28px;

  justify-items: center;
  align-items: start;
  margin-top: 30px;
}

.grid iframe {
  width: 100%;
  max-width: 260px;
  min-height: 620px;
  border: none;
  border-radius: 12px;
}

/* =======================
   DESCRIPCION
======================= */

.description {
  color: #e6d08a;
  text-shadow: 0 0 10px rgba(255,215,0,0.12);
  max-width: 700px;
  margin: 25px auto 0;
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #888;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}

</style>
</head>

<body>

<div id="rain"></div>
<div id="stars"></div>

<header>
  <h1>Black Diamond</h1>

  <!-- 💎 BADGE SOLO AJUSTADO AL TEXTO -->
  <div class="gold-badge">
    <div class="gold-title">Camisetas</div>
  </div>
</header>

<section class="grid">
  <!-- 🔴 PEGA AQUÍ TUS IFRAMES -->
</section>

<p class="description">
  Streetwear premium · ediciones limitadas · estilo exclusivo · envíos rápidos
</p>

<footer>
  © 2026 Black Diamond
</footer>

<script>

/* 💎 DIAMANTES */
function createDiamond(){
  const d = document.createElement("img");
  d.src = "https://i.imgur.com/5HS1lGY.png";
  d.className = "diamond";

  d.style.left = Math.random() * 100 + "vw";
  d.style.top = "-10vh";

  const size = 12 + Math.random() * 20;
  d.style.width = size + "px";

  d.style.animationDuration = (6 + Math.random() * 5) + "s";

  document.getElementById("rain").appendChild(d);

  setTimeout(() => d.remove(), 12000);
}

/* ✨ ESTRELLAS */
function createStar(){
  const s = document.createElement("div");
  s.className = "star";

  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";

  const size = Math.random() * 2.5;
  s.style.width = size + "px";
  s.style.height = size + "px";

  s.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.getElementById("stars").appendChild(s);

  setTimeout(() => s.remove(), 6000);
}

setInterval(createDiamond, 350);
setInterval(createStar, 40);

</script>

</body>
</html>
