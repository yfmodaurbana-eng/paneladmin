<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Diamond | Moda Streetwear Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =======================
   FONDO EFECTOS
======================= */

#rain, #stars {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.diamond {
  position: absolute;
  width: 18px;
  height: auto;
  opacity: 0.9;
  animation: fall linear forwards, glow 2.2s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.8));
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

@keyframes glow {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 2.5s infinite ease-in-out;
  box-shadow: 0 0 6px white;
}

@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
  100% { opacity: 0; transform: scale(0.8); }
}

/* =======================
   BASE
======================= */

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  background: linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
  overflow-x: hidden;
  text-align: center;
}

header, section, footer {
  position: relative;
  z-index: 2;
}

/* =======================
   TITULO BRILLANTE (LO RESTAURÉ)
======================= */

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

h1 {
  font-size: clamp(3.5rem, 8vw, 6.5rem);
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;

  background: linear-gradient(
    90deg,
    #7a5c12,
    #ffd700,
    #fff8dc,
    #d4af37,
    #7a5c12
  );

  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shimmer 4s linear infinite;

  text-shadow: 0 0 18px rgba(255,215,0,0.25);
}

/* =======================
   NAV
======================= */

nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  padding: 18px 10px;
}

nav a {
  text-decoration: none;
  color: #d4af37;
  font-weight: 700;
  padding: 10px 18px;
  border-radius: 12px;
  border: 1px solid rgba(212,175,55,0.4);
}

/* =======================
   LINGOTE / BADGE RESTAURADO
======================= */

.gold-badge {
  display: inline-block;
  margin: 30px auto 10px;
  padding: 10px 22px;

  border-radius: 18px;

  background: linear-gradient(
    145deg,
    #3a2a00,
    #b8860b,
    #ffd700,
    #b8860b,
    #3a2a00
  );

  background-size: 300% 300%;
  animation: shimmer 6s linear infinite;

  box-shadow:
    0 0 18px rgba(255,215,0,0.25),
    inset 0 0 14px rgba(0,0,0,0.6);

  border: 1px solid rgba(255,215,0,0.35);
}

.gold-title {
  font-size: clamp(1.3rem, 2vw, 1.8rem);
  font-family: 'Playfair Display', serif;

  background: linear-gradient(
    90deg,
    #7a5c12,
    #ffd700,
    #fff8dc,
    #d4af37,
    #7a5c12
  );

  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shimmer 4s linear infinite;

  margin: 0;
}

/* =======================
   GRID (CORRECTO PARA IFRAMES)
======================= */

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 28px;
  padding: 20px;
}

.grid iframe {
  width: 260px;
  height: 620px;
  border: none;
  border-radius: 12px;
}

/* =======================
   DESCRIPCIÓN RESTAURADA
======================= */

.description {
  color: #e6d08a;
  max-width: 700px;
  margin: 25px auto 0;
  font-size: 14px;
  text-shadow: 0 0 10px rgba(255,215,0,0.12);
}

/* FOOTER */
footer {
  padding: 30px;
  color: #888;
}

</style>
</head>

<body>

<div id="rain"></div>
<div id="stars"></div>

<nav>
  <a href="index.html">Inicio</a>
  <a href="camisetas.html">Camisetas</a>
  <a href="conjuntos.html">Conjuntos</a>
  <a href="gorras.html">Gorras</a>
</nav>

<header>
  <h1>Black Diamond</h1>

  <!-- 🔥 RESTAURADO LINGOTE -->
  <div class="gold-badge">
    <div class="gold-title">Camisetas</div>
  </div>
</header>

<section class="grid">
  <!-- 🔴 AQUÍ PEGAS LOS IFRAMES DEL PANEL -->
</section>

<!-- 🔥 RESTAURADA DESCRIPCIÓN -->
<div class="description">

</div>

<footer>
  © 2026 Black Diamond
</footer>

<script>

/* DIAMANTES */
function createDiamond(){
  const d = document.createElement("img");
  d.src = "https://i.imgur.com/5HS1lGY.png";
  d.className = "diamond";
  d.style.left = Math.random() * 100 + "vw";
  d.style.top = "-10vh";
  d.style.width = (12 + Math.random() * 20) + "px";
  d.style.animationDuration = (6 + Math.random() * 5) + "s";
  document.getElementById("rain").appendChild(d);
  setTimeout(() => d.remove(), 12000);
}

/* ESTRELLAS */
function createStar(){
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  document.getElementById("stars").appendChild(s);
  setTimeout(() => s.remove(), 6000);
}

setInterval(createDiamond, 350);
setInterval(createStar, 40);

</script>

</body>
</html>
