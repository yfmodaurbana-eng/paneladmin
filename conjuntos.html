<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Diamond | Moda Streetwear Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =======================
   EFECTOS DE FONDO
======================= */

#rain, #stars {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.diamond {
  position: absolute;
  width: 18px;
  height: auto;
  opacity: 0.9;
  pointer-events: none;
  animation: fall linear forwards, glow 2.2s ease-in-out infinite;
  transform-origin: center;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.8));
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

@keyframes glow {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 2.5s infinite ease-in-out;
  box-shadow: 0 0 6px white;
}

@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
  100% { opacity: 0; transform: scale(0.8); }
}

/* =======================
   BRILLO DORADO
======================= */

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* TITULOS */
h1, h2 {
  font-family: 'Playfair Display', serif;

  background: linear-gradient(
    90deg,
    #7a5c12,
    #ffd700,
    #fff8dc,
    #d4af37,
    #7a5c12
  );

  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shimmer 4s linear infinite;

  text-shadow: 0 0 14px rgba(255,215,0,0.25);
}

/* TEXTOS */
p {
  color: #e6d08a;
  text-shadow: 0 0 10px rgba(255,215,0,0.12);
}

/* =======================
   ESTILO GENERAL
======================= */

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  background: linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
  overflow-x: hidden;
}

header, section, footer, nav {
  position: relative;
  z-index: 2;
}

/* =======================
   MENU LIMPIO
======================= */

nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  padding: 20px;
  border-bottom: 1px solid rgba(212,175,55,0.15);
}

nav a {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 12px;
  font-size: 14px;

  color: #d4af37;
  font-weight: 700;

  border: 1px solid rgba(212,175,55,0.35);
  background: rgba(0,0,0,0.2);

  transition: 0.25s;
}

nav a:hover {
  background: rgba(212,175,55,0.15);
  border-color: rgba(255,215,0,0.6);
  transform: scale(1.05);
}

/* =======================
   HEADER
======================= */

header {
  text-align: center;
  padding: 50px 20px 20px;
}

/* =======================
   HERO
======================= */

.hero {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

.hero img {
  width: 100%;
  border-radius: 18px;
  display: block;
}

/* =======================
   CATALOGO
======================= */

.productos {
  padding: 60px 20px;
}

/* 🔥 TITULO CATALOGO CENTRADO PERFECTO */
.productos h2 {
  text-align: center;
  margin-bottom: 40px;
}

/* GRID */
.grid {
  max-width: 1400px;
  margin: 0 auto;

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 28px;

  justify-items: center;
  align-items: start;
}

.grid iframe {
  width: 100%;
  max-width: 260px;
  min-height: 620px;
  border: none;

  display: block;
  margin: 0 auto;
}

/* =======================
   FOOTER
======================= */

footer {
  text-align: center;
  padding: 30px;
  color: #888;
}

/* RESPONSIVE */

@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}

</style>
</head>

<body>

<div id="rain"></div>
<div id="stars"></div>

<nav>
  <a href="index.html">Inicio</a>
  <a href="camisetas.html">Camisetas</a>
  <a href="conjuntos.html">Conjuntos</a>
  <a href="gorras.html">Gorras</a>
</nav>

<header>
  <h1>Black Diamond</h1>
  <p>
    Streetwear premium · ediciones limitadas · estilo exclusivo · envíos rápidos
  </p>
</header>

<section class="hero">
  <img src="https://i.imgur.com/PFgZjzN.png" alt="Portada Black Diamond">
</section>

<section class="productos">
  <h2>Catálogo Destacado</h2>

  <div class="grid">
    <!-- 🔴 PEGA AQUÍ TUS IFRAMES -->
  </div>
</section>

<footer>
  © 2026 Black Diamond
</footer>

<script>

function createDiamond(){
  const d = document.createElement("img");
  d.src = "https://i.imgur.com/5HS1lGY.png";
  d.className = "diamond";
  d.style.left = Math.random() * 100 + "vw";
  d.style.top = "-10vh";
  const size = 10 + Math.random() * 20;
  d.style.width = size + "px";
  d.style.opacity = 0.5 + Math.random() * 0.5;
  d.style.transform = `rotate(${Math.random() * 360}deg)`;
  d.style.animationDuration = (8 + Math.random() * 6) + "s";
  document.getElementById("rain").appendChild(d);
  setTimeout(() => d.remove(), 12000);
}

function createStar(){
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  const size = Math.random() * 2.5;
  s.style.width = size + "px";
  s.style.height = size + "px";
  s.style.animationDuration = (1.5 + Math.random() * 3) + "s";
  document.getElementById("stars").appendChild(s);
  setTimeout(() => s.remove(), 6000);
}

setInterval(createDiamond, 350);
setInterval(createStar, 40);

</script>

</body>
</html>
