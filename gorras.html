<style>

/* CHISPITAS / DESTELLOS SUAVES */
#rain {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.diamond {
  position: absolute;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, #fff 0%, #bffcff 35%, #ffd700 60%, transparent 80%);
  transform: rotate(45deg);
  opacity: 0.85;
  box-shadow:
    0 0 5px rgba(255,255,255,0.8),
    0 0 10px rgba(0,255,255,0.45),
    0 0 16px rgba(255,215,0,0.35);
  animation: fall linear forwards, glow 2.2s ease-in-out infinite;
}

@keyframes fall {
  0% {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(240deg);
    opacity: 0;
  }
}

@keyframes glow {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  background: linear-gradient(180deg, #000 0%, #050505 50%, #000 100%);
  overflow-x: hidden;
}

header, section, footer, nav {
  position: relative;
  z-index: 2;
}

nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  padding: 20px;
  border-bottom: 1px solid rgba(212,175,55,0.15);
}

nav a {
  text-decoration: none;
  color: #fff;
  border: 1px solid rgba(212,175,55,0.25);
  padding: 10px 18px;
  border-radius: 12px;
  transition: 0.3s;
  font-size: 14px;
}

nav a:hover {
  background: #ABAA57;
  color: #000;
}

header {
  text-align: center;
  padding: 50px 20px 20px;
}

.title-gold {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;
  background: linear-gradient(90deg,#7a5c12,#ffd700,#fff8dc,#d4af37,#8c6a12);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  max-width: 700px;
  margin: 10px auto 0;
  color: #d6d6d6;
  line-height: 1.6;
}

.hero {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

.hero img {
  width: 100%;
  border-radius: 18px;
  display: block;
}

.productos {
  padding: 60px 20px;
}

.productos h2 {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin-bottom: 35px;
  background: linear-gradient(90deg,#b8860b,#fff,#d4af37,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.grid {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 28px;
  justify-items: center;
}

.grid iframe {
  width: 100%;
  max-width: 260px;
  min-height: 620px;
  border: none;
}

footer {
  text-align: center;
  padding: 30px;
  color: #888;
}

@media (max-width: 1024px) {
  .grid {
    grid-template-columns: repeat(2, minmax(240px, 1fr));
  }
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }

  nav {
    gap: 10px;
  }

  nav a {
    font-size: 13px;
    padding: 9px 14px;
  }
}
</style>

<body>

<script>
function createDiamond(){
  const d = document.createElement("div");
  d.className = "diamond";
  d.style.left = Math.random() * 100 + "vw";
  d.style.animationDuration = (4 + Math.random() * 5) + "s";
  document.getElementById("rain").appendChild(d);
  setTimeout(() => d.remove(), 7000);
}
setInterval(createDiamond, 180);
</script>
